<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TweakLife</title>

<style>
:root { color-scheme: dark; }
body { margin:0; font-family:sans-serif; }

/* ===== MENU ===== */
#menu {
    position:absolute;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:10px;
}

button, input {
    padding:10px;
    font-size:16px;
}

#canvas {
    display:none;
    border:2px dashed #555;
}
</style>
</head>

<body>

<div id="menu">
    <h1>TweakLife</h1>

    <input id="seedInput" placeholder="Seed (optional)">
    <input id="nameInput" placeholder="World Name">

    <button onclick="createWorld()">🌍 New World</button>
    <button onclick="showLoad()">📂 Load World</button>

    <div id="loadList"></div>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.17"></script>

<script>
// ================= STATE =================
let gameState = "menu";
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ================= SETTINGS =================
const predefinedColors = ['green','red','orange','cyan','magenta','lavender','teal'];

let settings = {
    seed: 0,
    numColors: 4,
    atoms: { count: 500, radius: 2 },
    rules: {},
    radii: {},
    rulesArray: [],
    radii2Array: [],
    colors: [],
    viscosity: 0.7,
    gravity: 0,
    time_scale: 1,
    gui:null
};

// ================= RNG =================
let local_seed = 0;
function rand(){
    let t = local_seed += 0x6D2B79F5;
    t = Math.imul(t ^ t>>>15, t|1);
    t ^= t + Math.imul(t ^ t>>>7, t|61);
    return ((t ^ t>>>14)>>>0)/4294967296;
}

// ================= MENU =================
function createWorld(){
    let seed = document.getElementById("seedInput").value;
    let name = document.getElementById("nameInput").value || "World";

    settings.seed = seed ? Number(seed) : Math.floor(Math.random()*999999999);

    startWorld();

    saveWorld(name);
}

function showLoad(){
    let list = document.getElementById("loadList");
    list.innerHTML="";

    let saves = JSON.parse(localStorage.getItem("tweaklife_saves")||"[]");

    saves.forEach((s,i)=>{
        let div = document.createElement("div");

        div.innerHTML = `
            ${s.name}
            <button onclick="loadWorld(${i})">Load</button>
            <button onclick="deleteWorld(${i})">Delete</button>
        `;
        list.appendChild(div);
    });
}

function saveWorld(name){
    let saves = JSON.parse(localStorage.getItem("tweaklife_saves")||"[]");

    saves.push({
        name,
        data: JSON.stringify(settings)
    });

    localStorage.setItem("tweaklife_saves", JSON.stringify(saves));
}

function loadWorld(i){
    let saves = JSON.parse(localStorage.getItem("tweaklife_saves"));
    settings = JSON.parse(saves[i].data);

    startWorld(true);
}

function deleteWorld(i){
    let saves = JSON.parse(localStorage.getItem("tweaklife_saves"));
    saves.splice(i,1);
    localStorage.setItem("tweaklife_saves", JSON.stringify(saves));
    showLoad();
}

// ================= START =================
function startWorld(loaded=false){
    document.getElementById("menu").style.display="none";
    canvas.style.display="block";

    resize();

    local_seed = settings.seed;

    if(!loaded){
        setColors();
        randomRules();
    } else {
        flattenRules();
    }

    randomAtoms(settings.atoms.count,true);
    setupGUI();
    gameState="game";
}

// ================= CANVAS =================
function resize(){
    canvas.width = window.innerWidth*0.95;
    canvas.height = window.innerHeight*0.95;
}
window.addEventListener("resize", resize);

// ================= COLORS =================
function setColors(){
    settings.colors=[];
    for(let i=0;i<settings.numColors;i++){
        settings.colors.push(predefinedColors[i]);
    }
}

// ================= RULES =================
function randomRules(){
    for(const c1 of settings.colors){
        settings.rules[c1]={};
        settings.radii[c1]=80;
        for(const c2 of settings.colors){
            settings.rules[c1][c2]=rand()*2-1;
        }
    }
    flattenRules();
}

function flattenRules(){
    settings.rulesArray=[];
    settings.radii2Array=[];
    for(const c1 of settings.colors){
        for(const c2 of settings.colors){
            settings.rulesArray.push(settings.rules[c1][c2]);
        }
        settings.radii2Array.push(settings.radii[c1]**2);
    }
}

// ================= ATOMS =================
let atoms=[];
function randomAtoms(n,clear){
    if(clear) atoms=[];
    for(let c=0;c<settings.colors.length;c++){
        for(let i=0;i<n;i++){
            atoms.push([
                Math.random()*canvas.width,
                Math.random()*canvas.height,
                0,0,c
            ]);
        }
    }
}

// ================= GRID =================
const cellSize=80;
let grid={};

function buildGrid(){
    grid={};
    for(const a of atoms){
        let gx=(a[0]/cellSize)|0;
        let gy=(a[1]/cellSize)|0;
        let key=gx+","+gy;
        if(!grid[key]) grid[key]=[];
        grid[key].push(a);
    }
}

function neighbors(a){
    let gx=(a[0]/cellSize)|0;
    let gy=(a[1]/cellSize)|0;
    let list=[];
    for(let x=-1;x<=1;x++){
        for(let y=-1;y<=1;y++){
            let key=(gx+x)+","+(gy+y);
            if(grid[key]) list.push(...grid[key]);
        }
    }
    return list;
}

// ================= PHYSICS =================
function applyRules(){
    buildGrid();

    for(const a of atoms){
        let fx=0, fy=0;
        let idx=a[4]*settings.numColors;
        let r2=settings.radii2Array[a[4]];

        for(const b of neighbors(a)){
            if(a===b) continue;

            let dx=a[0]-b[0];
            let dy=a[1]-b[1];
            let d=dx*dx+dy*dy;

            if(d>0 && d<r2){
                let g=settings.rulesArray[idx+b[4]];
                let F=g/Math.sqrt(d);
                fx+=F*dx;
                fy+=F*dy;
            }
        }

        a[2]=a[2]*(1-settings.viscosity)+fx*settings.time_scale;
        a[3]=a[3]*(1-settings.viscosity)+fy*settings.time_scale;
    }

    for(const a of atoms){
        a[0]+=a[2];
        a[1]+=a[3];

        if(a[0]<0||a[0]>canvas.width) a[2]*=-1;
        if(a[1]<0||a[1]>canvas.height) a[3]*=-1;
    }
}

// ================= DRAW =================
function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(const a of atoms){
        ctx.fillStyle=settings.colors[a[4]];
        ctx.fillRect(a[0],a[1],settings.atoms.radius,settings.atoms.radius);
    }
}

// ================= LOOP =================
function loop(){
    if(gameState==="game"){
        applyRules();
        draw();
    }
    requestAnimationFrame(loop);
}
loop();

// ================= GUI =================
function setupGUI(){
    if(settings.gui) settings.gui.destroy();
    settings.gui = new lil.GUI();

    settings.gui.add(settings.atoms,"count",100,3000,100)
        .onFinishChange(()=> randomAtoms(settings.atoms.count,true));

    settings.gui.add(settings,"viscosity",0.1,1,0.05);
    settings.gui.add(settings,"gravity",-0.5,0.5,0.01);
}

</script>
</body>
</html>
