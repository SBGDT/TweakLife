<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life PRO+</title>

<style>
:root { color-scheme: dark; }
body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}
canvas {
    border: 2px dashed #555;
}
</style>
</head>

<body>
<canvas id="canvas" tabindex="1"></canvas>
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.17"></script>

<script>
// ================= SETTINGS =================
const maxRadius = 200;
const predefinedColors = ['green','red','orange','cyan','magenta','lavender','teal'];

const settings = {
    seed: 12345,
    numColors: 4,
    atoms: { count: 600, radius: 2 },
    rules: {},
    radii: {},
    colors: [],
    rulesArray: [],
    radii2Array: [],
    viscosity: 0.7,
    gravity: 0,
    wallRepel: 40,
    time_scale: 1,
    reset: ()=> randomAtoms(settings.atoms.count,true),
    randomRules: ()=> startRandom(),
};

// ================= CANVAS =================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = window.innerWidth*0.95;
    canvas.height = window.innerHeight*0.95;
}
window.addEventListener("resize", resize);
resize();

// ================= RNG =================
let local_seed = settings.seed;
function rand(){
    let t = local_seed += 0x6D2B79F5;
    t = Math.imul(t ^ t>>>15, t|1);
    t ^= t + Math.imul(t ^ t>>>7, t|61);
    return ((t ^ t>>>14)>>>0)/4294967296;
}

// ================= COLORS =================
function setColors(){
    settings.colors=[];
    for(let i=0;i<settings.numColors;i++){
        settings.colors.push(predefinedColors[i]);
    }
}

// ================= RULES =================
function randomRules(){
    local_seed = settings.seed;
    for(const c1 of settings.colors){
        settings.rules[c1]={};
        settings.radii[c1]=80;
        for(const c2 of settings.colors){
            settings.rules[c1][c2]=rand()*2-1;
        }
    }
    flattenRules();
}

function flattenRules(){
    settings.rulesArray=[];
    settings.radii2Array=[];
    for(const c1 of settings.colors){
        for(const c2 of settings.colors){
            settings.rulesArray.push(settings.rules[c1][c2]);
        }
        settings.radii2Array.push(settings.radii[c1]**2);
    }
}

// ================= ATOMS =================
let atoms=[];

function create(n,c){
    for(let i=0;i<n;i++){
        atoms.push([
            Math.random()*canvas.width,
            Math.random()*canvas.height,
            0,0,c
        ]);
    }
}

function randomAtoms(n,clear){
    if(clear) atoms=[];
    for(let i=0;i<settings.colors.length;i++){
        create(n,i);
    }
}

// ================= GRID =================
const cellSize = 80;
let grid={};

function buildGrid(){
    grid={};
    for(const a of atoms){
        let gx=(a[0]/cellSize)|0;
        let gy=(a[1]/cellSize)|0;
        let key=gx+","+gy;
        if(!grid[key]) grid[key]=[];
        grid[key].push(a);
    }
}

function neighbors(a){
    let gx=(a[0]/cellSize)|0;
    let gy=(a[1]/cellSize)|0;
    let list=[];
    for(let x=-1;x<=1;x++){
        for(let y=-1;y<=1;y++){
            let key=(gx+x)+","+(gy+y);
            if(grid[key]) list.push(...grid[key]);
        }
    }
    return list;
}

// ================= PHYSICS =================
function applyRules(){
    buildGrid();

    for(const a of atoms){
        let fx=0, fy=0;
        let idx=a[4]*settings.numColors;
        let r2=settings.radii2Array[a[4]];

        for(const b of neighbors(a)){
            if(a===b) continue;

            let dx=a[0]-b[0];
            let dy=a[1]-b[1];
            let d=dx*dx+dy*dy;

            if(d>0 && d<r2){
                let g=settings.rulesArray[idx+b[4]];
                let F=g/Math.sqrt(d);
                fx+=F*dx;
                fy+=F*dy;
            }
        }

        fy+=settings.gravity;

        let vmix=(1-settings.viscosity);
        a[2]=a[2]*vmix+fx*settings.time_scale;
        a[3]=a[3]*vmix+fy*settings.time_scale;
    }

    for(const a of atoms){
        a[0]+=a[2];
        a[1]+=a[3];

        if(a[0]<0||a[0]>canvas.width) a[2]*=-1;
        if(a[1]<0||a[1]>canvas.height) a[3]*=-1;
    }
}

// ================= DRAW =================
function draw(){
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    for(const a of atoms){
        ctx.fillStyle=settings.colors[a[4]];
        ctx.fillRect(a[0],a[1],settings.atoms.radius,settings.atoms.radius);
    }
}

// ================= LOOP =================
function loop(){
    applyRules();
    draw();
    requestAnimationFrame(loop);
}

// ================= GUI =================
const gui = new lil.GUI();

gui.add(settings.atoms,"count",100,3000,100).onFinishChange(()=>{
    randomAtoms(settings.atoms.count,true);
});

gui.add(settings,"viscosity",0.1,1,0.05);
gui.add(settings,"gravity",-0.5,0.5,0.01);
gui.add(settings,"time_scale",0.1,3,0.1);

gui.add(settings,"randomRules");
gui.add(settings,"reset");

// ================= START =================
function startRandom(){
    setColors();
    randomRules();
    randomAtoms(settings.atoms.count,true);
}

startRandom();
loop();

</script>
</body>
</html>
